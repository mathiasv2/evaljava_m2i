# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Replace database user
      run: sed -i 's/${DB_USER}/${{ secrets.DB_USER }}/' src/main/resources/application.properties

    - name: Replace database password
      run: sed -i 's/${DB_PASSWORD}/${{ secrets.DB_PASSWORD }}/' src/main/resources/application.properties

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Extract version from pom.xml and init variable "VERSION"
      run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

    - name: Build image
      run: docker image build -t fbansept/chatbot-msii:${{ env.VERSION }} .

    - name: Tag image as latest
      run: docker image tag fbansept/chatbot-msii:${{ env.VERSION }} fbansept/chatbot-msii:latest

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: fbansept
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push image on dockerhub
      run: docker push fbansept/chatbot-msii:${{ env.VERSION }}

    - name: Push image latest tag on dockerhub
      run: docker push fbansept/chatbot-msii:latest